name: Provision Infrastructure

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to validate the application infrastructure for"
        required: true
        type: string
      BUILD_VERSION:
        description: "The version of the build to deploy to the application resources"
        required: true
        type: string
      AZURE_LOCATION:
        description: "The Azure region to deploy the application resources to"
        required: true
        type: string
      AZURE_ENV_NAME:
        description: "The name of the Azure environment"
        required: true
        type: string
      AZURE_NETWORK_ISOLATION:
        description: "Whether to deploy the application resources in a network isolated environment"
        required: false
        type: string
        default: 'false'
      DEPLOY_SAMPLE_MODELS:
        description: "Whether to deploy the sample model deployments"
        required: false
        type: string
        default: 'false'
      MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON:
        description: "Whether to deploy sample applications from the sample-foundry-applications.json file"
        required: false
        type: string
        default: 'false'
      DEPLOY_CAPABILITY_HOSTS:
        description: "Whether to deploy Cosmos DB and configure capability hosts (enables COSMOS_DB_DEPLOY, COSMOS_DB_CAPABILITY_HOST, AZURE_AI_SEARCH_CAPABILITY_HOST, AZURE_STORAGE_ACCOUNT_CAPABILITY_HOST)"
        required: false
        type: string
        default: 'false'

    outputs:
      AZURE_RESOURCE_GROUP:
        description: "The Azure resource group name"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_RESOURCE_GROUP }}
      AZURE_PRINCIPAL_ID:
        description: "The Azure principal ID"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_PRINCIPAL_ID }}
      AZURE_PRINCIPAL_ID_TYPE:
        description: "The Azure principal ID type"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_PRINCIPAL_ID_TYPE }}
      LOG_ANALYTICS_WORKSPACE_NAME:
        description: "The Log Analytics workspace name"
        value: ${{ jobs.provision-infrastructure.outputs.LOG_ANALYTICS_WORKSPACE_NAME }}
      LOG_ANALYTICS_RESOURCE_ID:
        description: "The Log Analytics resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.LOG_ANALYTICS_RESOURCE_ID }}
      LOG_ANALYTICS_WORKSPACE_ID:
        description: "The Log Analytics workspace ID"
        value: ${{ jobs.provision-infrastructure.outputs.LOG_ANALYTICS_WORKSPACE_ID }}
      APPLICATION_INSIGHTS_NAME:
        description: "The Application Insights name"
        value: ${{ jobs.provision-infrastructure.outputs.APPLICATION_INSIGHTS_NAME }}
      APPLICATION_INSIGHTS_RESOURCE_ID:
        description: "The Application Insights resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.APPLICATION_INSIGHTS_RESOURCE_ID }}
      APPLICATION_INSIGHTS_INSTRUMENTATION_KEY:
        description: "The Application Insights instrumentation key"
        value: ${{ jobs.provision-infrastructure.outputs.APPLICATION_INSIGHTS_INSTRUMENTATION_KEY }}
      AZURE_AI_SEARCH_NAME:
        description: "The Azure AI Search service name"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_AI_SEARCH_NAME }}
      AZURE_AI_SEARCH_ID:
        description: "The Azure AI Search service resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_AI_SEARCH_ID }}
      MICROSOFT_FOUNDRY_NAME:
        description: "The Microsoft Foundry service name"
        value: ${{ jobs.provision-infrastructure.outputs.MICROSOFT_FOUNDRY_NAME }}
      MICROSOFT_FOUNDRY_ID:
        description: "The Microsoft Foundry service resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.MICROSOFT_FOUNDRY_ID }}
      MICROSOFT_FOUNDRY_ENDPOINT:
        description: "The Microsoft Foundry service endpoint"
        value: ${{ jobs.provision-infrastructure.outputs.MICROSOFT_FOUNDRY_ENDPOINT }}
      MICROSOFT_FOUNDRY_RESOURCE_ID:
        description: "The Microsoft Foundry service resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.MICROSOFT_FOUNDRY_RESOURCE_ID }}
      MICROSOFT_FOUNDRY_PROJECT_NAME:
        description: "The Microsoft Foundry project name"
        value: ${{ jobs.provision-infrastructure.outputs.MICROSOFT_FOUNDRY_PROJECT_NAME }}
      COSMOS_DB_NAME:
        description: "The Cosmos DB account name"
        value: ${{ jobs.provision-infrastructure.outputs.COSMOS_DB_NAME }}
      COSMOS_DB_ID:
        description: "The Cosmos DB account resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.COSMOS_DB_ID }}
      COSMOS_DB_ENDPOINT:
        description: "The Cosmos DB account endpoint"
        value: ${{ jobs.provision-infrastructure.outputs.COSMOS_DB_ENDPOINT }}
      AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_NAME:
        description: "The sample data storage account name"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_NAME }}
      AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_RESOURCE_ID:
        description: "The sample data storage account resource ID"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_RESOURCE_ID }}
      AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_BLOB_ENDPOINT:
        description: "The sample data storage account blob endpoint"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_BLOB_ENDPOINT }}

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID to use for authentication to Azure for deployment"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID to use for authentication to Azure for deployment"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID to use for authentication to Azure for deployment"
        required: true

jobs:
  provision-infrastructure:
    name: Provision Infrastructure ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_NETWORK_ISOLATION: ${{ inputs.AZURE_NETWORK_ISOLATION }}
      DEPLOY_SAMPLE_MODELS: ${{ inputs.DEPLOY_SAMPLE_MODELS }}
      DEPLOY_SAMPLE_DATA: true
      MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON: ${{ inputs.MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON }}
      DEPLOY_CAPABILITY_HOSTS: ${{ inputs.DEPLOY_CAPABILITY_HOSTS }}
      AZURE_PRINCIPAL_ID_TYPE: 'ServicePrincipal'

    outputs:
      AZURE_RESOURCE_GROUP: ${{ steps.get_infrastructure_outputs.outputs.AZURE_RESOURCE_GROUP }}
      AZURE_PRINCIPAL_ID: ${{ steps.get_infrastructure_outputs.outputs.AZURE_PRINCIPAL_ID }}
      AZURE_PRINCIPAL_ID_TYPE: ${{ steps.get_infrastructure_outputs.outputs.AZURE_PRINCIPAL_ID_TYPE }}
      LOG_ANALYTICS_WORKSPACE_NAME: ${{ steps.get_infrastructure_outputs.outputs.LOG_ANALYTICS_WORKSPACE_NAME }}
      LOG_ANALYTICS_RESOURCE_ID: ${{ steps.get_infrastructure_outputs.outputs.LOG_ANALYTICS_RESOURCE_ID }}
      LOG_ANALYTICS_WORKSPACE_ID: ${{ steps.get_infrastructure_outputs.outputs.LOG_ANALYTICS_WORKSPACE_ID }}
      APPLICATION_INSIGHTS_NAME: ${{ steps.get_infrastructure_outputs.outputs.APPLICATION_INSIGHTS_NAME }}
      APPLICATION_INSIGHTS_RESOURCE_ID: ${{ steps.get_infrastructure_outputs.outputs.APPLICATION_INSIGHTS_RESOURCE_ID }}
      APPLICATION_INSIGHTS_INSTRUMENTATION_KEY: ${{ steps.get_infrastructure_outputs.outputs.APPLICATION_INSIGHTS_INSTRUMENTATION_KEY }}
      AZURE_AI_SEARCH_NAME: ${{ steps.get_infrastructure_outputs.outputs.AZURE_AI_SEARCH_NAME }}
      AZURE_AI_SEARCH_ID: ${{ steps.get_infrastructure_outputs.outputs.AZURE_AI_SEARCH_ID }}
      MICROSOFT_FOUNDRY_NAME: ${{ steps.get_infrastructure_outputs.outputs.MICROSOFT_FOUNDRY_NAME }}
      MICROSOFT_FOUNDRY_ID: ${{ steps.get_infrastructure_outputs.outputs.MICROSOFT_FOUNDRY_ID }}
      MICROSOFT_FOUNDRY_ENDPOINT: ${{ steps.get_infrastructure_outputs.outputs.MICROSOFT_FOUNDRY_ENDPOINT }}
      MICROSOFT_FOUNDRY_RESOURCE_ID: ${{ steps.get_infrastructure_outputs.outputs.MICROSOFT_FOUNDRY_RESOURCE_ID }}
      MICROSOFT_FOUNDRY_PROJECT_NAME: ${{ steps.get_infrastructure_outputs.outputs.MICROSOFT_FOUNDRY_PROJECT_NAME }}
      COSMOS_DB_NAME: ${{ steps.get_infrastructure_outputs.outputs.COSMOS_DB_NAME }}
      COSMOS_DB_ID: ${{ steps.get_infrastructure_outputs.outputs.COSMOS_DB_ID }}
      COSMOS_DB_ENDPOINT: ${{ steps.get_infrastructure_outputs.outputs.COSMOS_DB_ENDPOINT }}
      AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_NAME: ${{ steps.get_infrastructure_outputs.outputs.AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_NAME }}
      AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_RESOURCE_ID: ${{ steps.get_infrastructure_outputs.outputs.AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_RESOURCE_ID }}
      AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_BLOB_ENDPOINT: ${{ steps.get_infrastructure_outputs.outputs.AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_BLOB_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2.2.0

      - name: Authenticate Azure Developer CLI (Federated Credentials)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: Authenticate Azure CLI (Federated Credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Azure Developer CLI environment
        run: |
          azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION"

      - name: Set Azure Developer CLI environment variables
        run: |
          azd env set BUILD_VERSION "$BUILD_VERSION"
          azd env set DEPLOY_SAMPLE_DATA "$DEPLOY_SAMPLE_DATA"
          azd env set DEPLOY_SAMPLE_MODELS "$DEPLOY_SAMPLE_MODELS"
          azd env set AZURE_NETWORK_ISOLATION "$AZURE_NETWORK_ISOLATION"
          azd env set MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON "$MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON"
          if [ "$DEPLOY_CAPABILITY_HOSTS" = "true" ]; then
            azd env set COSMOS_DB_DEPLOY "true"
            azd env set COSMOS_DB_CAPABILITY_HOST "true"
            azd env set AZURE_AI_SEARCH_CAPABILITY_HOST "true"
            azd env set AZURE_STORAGE_ACCOUNT_CAPABILITY_HOST "true"
          fi
          azd env set AZURE_PRINCIPAL_ID_TYPE "$AZURE_PRINCIPAL_ID_TYPE"
          azd env set AZURE_RESOURCE_GROUP "rg-${AZURE_ENV_NAME}"

      - name: Provision Infrastructure using Azure Developer CLI
        id: provision
        continue-on-error: true
        run: azd provision --no-prompt

      - name: Cleanup on Provision Failure
        if: steps.provision.outcome == 'failure'
        run: |
          echo "Provisioning failed. Cleaning up partially deployed infrastructure..."

          # Attempt azd down first
          echo "Attempting cleanup via azd down..."
          azd down --no-prompt --purge --force || true

          # Fallback: Delete resource group directly via Azure CLI.
          # azd down may fail to find resources when provisioning didn't complete,
          # because the azd environment state was never updated with the deployment.
          RESOURCE_GROUP="rg-${AZURE_ENV_NAME}"
          echo "Checking if resource group '${RESOURCE_GROUP}' still exists..."
          if az group exists --name "$RESOURCE_GROUP" 2>/dev/null | grep -qi "true"; then
            echo "Resource group '${RESOURCE_GROUP}' still exists. Deleting via Azure CLI..."
            az group delete --name "$RESOURCE_GROUP" --yes
            echo "Resource group deleted."
          else
            echo "Resource group '${RESOURCE_GROUP}' does not exist or was already deleted."
          fi

          # Purge any soft-deleted Cognitive Services resources that were in the resource group.
          # These block future deployments with the same name if not purged.
          echo "Checking for soft-deleted Cognitive Services resources to purge..."
          DELETED_ACCOUNTS=$(az cognitiveservices account list-deleted \
            --subscription "$AZURE_SUBSCRIPTION_ID" \
            --query "[?contains(id, '${RESOURCE_GROUP}')]" -o json 2>/dev/null || echo "[]")

          if [ "$DELETED_ACCOUNTS" != "[]" ] && [ -n "$DELETED_ACCOUNTS" ]; then
            echo "$DELETED_ACCOUNTS" | jq -c '.[]' | while read -r account; do
              ACCOUNT_NAME=$(echo "$account" | jq -r '.name')
              ACCOUNT_LOCATION=$(echo "$account" | jq -r '.location')
              ACCOUNT_RG=$(echo "$account" | jq -r '.id' | sed 's|.*/resourceGroups/\([^/]*\)/.*|\1|')
              echo "Purging soft-deleted Cognitive Services account: $ACCOUNT_NAME (location: $ACCOUNT_LOCATION)"
              az cognitiveservices account purge \
                --name "$ACCOUNT_NAME" \
                --resource-group "$ACCOUNT_RG" \
                --location "$ACCOUNT_LOCATION" || true
            done
          else
            echo "No soft-deleted Cognitive Services resources found to purge."
          fi

          echo "Cleanup completed."

      - name: Fail if Provision Failed
        if: steps.provision.outcome == 'failure'
        run: |
          echo "::error::Infrastructure provisioning failed. Partial deployment has been cleaned up."
          exit 1

      - name: Save azd environment state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azd-env-${{ inputs.AZURE_ENV_NAME }}
          path: .azure/${{ inputs.AZURE_ENV_NAME }}
          retention-days: 1

      - name: Get Infrastructure Outputs
        id: get_infrastructure_outputs
        run: |
          # Get all outputs from azd env get-values and pass them through directly
          echo "Getting azd environment outputs..."
          AZD_OUTPUTS=$(azd env get-values)

          # Define all the output variables we want to extract from azd outputs
          OUTPUT_VARS=(
            "AZURE_RESOURCE_GROUP"
            "AZURE_PRINCIPAL_ID"
            "AZURE_PRINCIPAL_ID_TYPE"
            "LOG_ANALYTICS_WORKSPACE_NAME"
            "LOG_ANALYTICS_RESOURCE_ID"
            "LOG_ANALYTICS_WORKSPACE_ID"
            "APPLICATION_INSIGHTS_NAME"
            "APPLICATION_INSIGHTS_RESOURCE_ID"
            "APPLICATION_INSIGHTS_INSTRUMENTATION_KEY"
            "AZURE_AI_SEARCH_NAME"
            "AZURE_AI_SEARCH_ID"
            "MICROSOFT_FOUNDRY_NAME"
            "MICROSOFT_FOUNDRY_ID"
            "MICROSOFT_FOUNDRY_ENDPOINT"
            "MICROSOFT_FOUNDRY_RESOURCE_ID"
            "MICROSOFT_FOUNDRY_PROJECT_NAME"
            "COSMOS_DB_NAME"
            "COSMOS_DB_ID"
            "COSMOS_DB_ENDPOINT"
            "AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_NAME"
            "AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_RESOURCE_ID"
            "AZURE_SAMPLE_DATA_STORAGE_ACCOUNT_BLOB_ENDPOINT"
          )

          # Extract and set each output variable directly from azd outputs
          for VAR_NAME in "${OUTPUT_VARS[@]}"; do
            VAR_VALUE=$(echo "$AZD_OUTPUTS" | grep "^${VAR_NAME}=" | cut -d'=' -f2- | xargs)
            echo "$VAR_NAME=$VAR_VALUE" >> $GITHUB_OUTPUT
            echo "Set $VAR_NAME=$VAR_VALUE"
          done
