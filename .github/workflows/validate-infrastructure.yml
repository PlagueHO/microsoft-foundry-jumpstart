name: Validate Infrastructure

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to validate the application infrastructure for"
        required: true
        type: string
      BUILD_VERSION:
        description: "The version of the build to deploy to the application resources"
        required: true
        type: string
      AZURE_LOCATION:
        description: "The Azure region to deploy the application resources to"
        required: true
        type: string
      AZURE_ENV_NAME:
        description: "The name of the Azure environment"
        required: true
        type: string
      AZURE_NETWORK_ISOLATION:
        description: "Whether to deploy the application resources in a network isolated environment"
        required: false
        type: string
        default: 'false'
      DEPLOY_SAMPLE_MODELS:
        description: "Whether to deploy the sample model deployments"
        required: false
        type: string
        default: 'false'
      MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON:
        description: "Whether to deploy sample applications from the sample-foundry-applications.json file"
        required: false
        type: string
        default: 'false'
      DEPLOY_CAPABILITY_HOSTS:
        description: "Whether to deploy Cosmos DB and configure capability hosts"
        required: false
        type: string
        default: 'false'

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID to use for authentication to Azure for deployment"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID to use for authentication to Azure for deployment"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID to use for authentication to Azure for deployment"
        required: true
  
jobs:
  validate-infrastructure:
    name: Validate Infrastructure ${{ inputs.ENVIRONMENT }}
    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    env:
      AZURE_ENV_NAME: ${{ inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_NETWORK_ISOLATION: ${{ inputs.AZURE_NETWORK_ISOLATION }}
      DEPLOY_SAMPLE_MODELS: ${{ inputs.DEPLOY_SAMPLE_MODELS }}
      DEPLOY_SAMPLE_DATA: 'true'
      MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON: ${{ inputs.MICROSOFT_FOUNDRY_APPLICATIONS_FROM_JSON }}
      COSMOS_DB_DEPLOY: ${{ inputs.DEPLOY_CAPABILITY_HOSTS }}
      COSMOS_DB_CAPABILITY_HOST: ${{ inputs.DEPLOY_CAPABILITY_HOSTS }}
      AZURE_AI_SEARCH_CAPABILITY_HOST: ${{ inputs.DEPLOY_CAPABILITY_HOSTS }}
      AZURE_STORAGE_ACCOUNT_CAPABILITY_HOST: ${{ inputs.DEPLOY_CAPABILITY_HOSTS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Validate Bicep
        id: validate-azure-infrastructure
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          name: ${{ inputs.AZURE_ENV_NAME }}-${{inputs.AZURE_LOCATION}}-${{ inputs.ENVIRONMENT }}-${{ github.action_ref }}-${{ github.run_number }}
          scope: subscription
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          location: ${{ inputs.AZURE_LOCATION }}
          template-file: ./infra/main.bicep
          parameters-file: ./infra/main.bicepparam
